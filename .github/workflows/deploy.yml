name: Deploy Website to InfinityFree via FTP

on:
  push:
    branches:
      - main
      # You can add other branches if needed, like 'master'

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The remote directory might be something like htdocs/ depending on InfinityFree setup
          # server-dir: htdocs/
