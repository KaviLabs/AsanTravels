<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asan Travels | Custom Sri Lanka Itinerary Map</title>
  <meta name="description" content="Explore Sri Lanka's most iconic destinations with Asan Travels. Build your perfect custom tour itinerary with our interactive map featuring handpicked locations." />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { outfit: ['Outfit', 'sans-serif'] },
          colors: {
            gold: { DEFAULT: '#C9A84C', light: '#E8C96A', dark: '#9A7A2E' },
            glass: 'rgba(10, 12, 20, 0.75)',
          },
        },
      },
    };
  </script>

  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: #07090F;
      color: #e2e8f0;
    }

    /* ─── Page Fade-In ─── */
    #page-wrapper {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    #page-wrapper.visible { opacity: 1; transform: translateY(0); }

    /* ─── Header ─── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(7,9,15,0.95) 0%, rgba(7,9,15,0) 100%);
      backdrop-filter: blur(2px);
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(135deg, #C9A84C, #E8C96A, #C9A84C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }
    .header-tagline {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(201, 168, 76, 0.65);
      text-transform: uppercase;
    }
    .itinerary-btn {
      position: relative;
      padding: 0.45rem 1.2rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #07090F;
      background: linear-gradient(135deg, #C9A84C, #E8C96A);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 18px rgba(201,168,76,0.35);
    }
    .itinerary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 28px rgba(201,168,76,0.55);
    }

    /* ─── Map Container ─── */
    #map-container {
      position: fixed;
      inset: 0;
      top: 64px;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #map-container.map-visible { opacity: 1; }
    #map {
      width: 100%;
      height: 100vh;
      height: calc(100vh - 64px);
    }

    /* ─── Leaflet overrides ─── */
    .leaflet-container { background: #07090F !important; }
    .leaflet-control-zoom a {
      background: rgba(10,12,20,0.85) !important;
      color: #C9A84C !important;
      border-color: rgba(201,168,76,0.25) !important;
      backdrop-filter: blur(8px);
    }
    .leaflet-control-zoom a:hover { background: rgba(201,168,76,0.15) !important; }
    .leaflet-control-attribution {
      background: rgba(7,9,15,0.7) !important;
      color: rgba(255,255,255,0.3) !important;
      font-size: 0.6rem !important;
      backdrop-filter: blur(4px);
    }
    .leaflet-control-attribution a { color: rgba(201,168,76,0.5) !important; }
    .leaflet-popup-pane { z-index: 700; }

    /* ─── Custom Pulse Marker ─── */
    .pulse-marker-wrapper {
      position: relative;
      width: 28px;
      height: 28px;
    }
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.8);
      animation: pulseRing 2.2s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.7s; }
    .pulse-ring:nth-child(3) { animation-delay: 1.4s; }
    .pulse-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, #E8C96A 0%, #C9A84C 60%);
      box-shadow: 0 0 12px rgba(201,168,76,0.9), 0 0 24px rgba(201,168,76,0.4);
    }
    @keyframes pulseRing {
      0%   { transform: scale(0.4); opacity: 0.9; }
      80%  { transform: scale(2.4); opacity: 0; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* ─── Drop-In Marker Animation ─── */
    .marker-drop {
      opacity: 0;
      transform: translateY(-40px) scale(0.5);
      transition: opacity 0.55s cubic-bezier(0.34,1.56,0.64,1),
                  transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }
    .marker-drop.dropped {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ─── Glassmorphism Popup ─── */
    .leaflet-popup-content-wrapper {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: rgba(201,168,76,0.8) !important;
      font-size: 1.1rem !important;
      top: 10px !important;
      right: 12px !important;
      z-index: 10;
    }
    .leaflet-popup-close-button:hover { color: #E8C96A !important; }

    .glass-card {
      width: 260px;
      background: rgba(8, 10, 18, 0.72);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 0 40px rgba(201,168,76,0.08);
      animation: cardFadeIn 0.3s ease forwards;
    }
    @keyframes cardFadeIn {
      from { opacity:0; transform: scale(0.92) translateY(6px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }
    .glass-card .card-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
    }
    .glass-card .card-body { padding: 0.9rem 1rem 1rem; }
    .card-location-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #C9A84C;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 30px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #F1EBD6;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-tagline {
      font-size: 0.72rem;
      font-weight: 300;
      color: rgba(200,195,180,0.75);
      line-height: 1.45;
      margin-bottom: 0.8rem;
    }
    .add-btn {
      width: 100%;
      padding: 0.45rem 0;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #07090F;
      background: linear-gradient(135deg, #C9A84C, #E8C96A);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      box-shadow: 0 0 14px rgba(201,168,76,0.3);
    }
    .add-btn:hover {
      box-shadow: 0 0 22px rgba(201,168,76,0.55);
      transform: translateY(-1px);
    }
    .add-btn:active { transform: translateY(0); }
    .add-btn.added {
      background: linear-gradient(135deg, #2D6A4F, #40916C);
      box-shadow: 0 0 14px rgba(64,145,108,0.3);
    }

    /* ─── Itinerary Panel (slide-in) ─── */
    #itinerary-panel {
      position: fixed;
      top: 64px; right: 0;
      width: 310px;
      height: calc(100vh - 64px);
      background: rgba(8,10,18,0.88);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(201,168,76,0.15);
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      z-index: 900;
      display: flex;
      flex-direction: column;
    }
    #itinerary-panel.open { transform: translateX(0); }
    .panel-header {
      padding: 1.2rem 1.4rem 1rem;
      border-bottom: 1px solid rgba(201,168,76,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #C9A84C, #E8C96A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .panel-close {
      background: none;
      border: none;
      color: rgba(201,168,76,0.6);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .panel-close:hover { color: #E8C96A; }
    #itinerary-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 1.2rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(201,168,76,0.3) transparent;
    }
    .itinerary-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 0.8rem;
      margin-bottom: 0.5rem;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 10px;
      animation: slideIn 0.35s ease forwards;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }
    .item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #E8C96A, #C9A84C);
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(201,168,76,0.6);
    }
    .item-name {
      font-size: 0.78rem;
      font-weight: 500;
      color: #E2D9C0;
      flex: 1;
    }
    .item-remove {
      background: none;
      border: none;
      color: rgba(255,100,100,0.5);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .item-remove:hover { color: rgba(255,100,100,0.9); }
    .panel-footer {
      padding: 1rem 1.2rem 1.4rem;
      border-top: 1px solid rgba(201,168,76,0.12);
    }
    .request-btn {
      width: 100%;
      padding: 0.6rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #07090F;
      background: linear-gradient(135deg, #C9A84C, #E8C96A);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(201,168,76,0.35);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .request-btn:hover {
      box-shadow: 0 0 28px rgba(201,168,76,0.55);
      transform: translateY(-1px);
    }
    .empty-msg {
      text-align: center;
      padding: 2rem 1rem;
      color: rgba(200,195,180,0.4);
      font-size: 0.78rem;
      font-weight: 300;
    }
    #item-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      font-size: 0.62rem;
      font-weight: 700;
      background: linear-gradient(135deg, #C9A84C, #E8C96A);
      color: #07090F;
      border-radius: 9px;
      margin-left: 6px;
      display: none;
    }

    /* ─── Loading Overlay ─── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #07090F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #C9A84C, #E8C96A, #C9A84C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      animation: shimmer 2s linear infinite;
      background-size: 200%;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(201,168,76,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #C9A84C, #E8C96A);
      width: 0%;
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 12px rgba(201,168,76,0.6);
    }
    .loader-text {
      margin-top: 1rem;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.45);
    }

    /* ─── Legend ─── */
    #map-legend {
      position: absolute;
      bottom: 1.5rem;
      left: 1.2rem;
      z-index: 800;
      background: rgba(8,10,18,0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }
    .legend-title {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      margin-bottom: 0.5rem;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.68rem;
      color: rgba(225,210,175,0.7);
      margin-bottom: 3px;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #E8C96A, #C9A84C);
      box-shadow: 0 0 8px rgba(201,168,76,0.7);
      flex-shrink: 0;
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      #site-header { padding: 0 1rem; }
      .header-tagline { display: none; }
      #itinerary-panel { width: 100%; }
      .glass-card { width: 220px; }
    }
  </style>
</head>
<body>

<!-- ══════════ LOADING OVERLAY ══════════ -->
<div id="loading-overlay">
  <div class="loader-logo">ASAN TRAVELS</div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-text">Mapping your paradise&hellip;</div>
</div>

<!-- ══════════ PAGE WRAPPER ══════════ -->
<div id="page-wrapper">

  <!-- HEADER -->
  <header id="site-header">
    <div>
      <div class="logo-text">✦ Asan Travels</div>
      <div class="header-tagline">Sri Lanka | Custom Itineraries</div>
    </div>
    <button class="itinerary-btn" id="toggle-panel-btn" onclick="togglePanel()">
      My Itinerary <span id="item-count">0</span>
    </button>
  </header>

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>
    <!-- LEGEND -->
    <div id="map-legend">
      <div class="legend-title">Destinations</div>
      <div class="legend-row"><div class="legend-dot"></div> Cultural &amp; Heritage</div>
      <div class="legend-row"><div class="legend-dot"></div> Hill Country</div>
      <div class="legend-row"><div class="legend-dot"></div> Coastal &amp; Safari</div>
    </div>
  </div>

  <!-- ITINERARY PANEL -->
  <div id="itinerary-panel">
    <div class="panel-header">
      <span class="panel-title">My Itinerary</span>
      <button class="panel-close" onclick="togglePanel()">✕</button>
    </div>
    <div id="itinerary-list">
      <div class="empty-msg" id="empty-msg">
        No locations added yet.<br/>Click <em>Add to Itinerary</em> on any pin to start building your trip.
      </div>
    </div>
    <div class="panel-footer">
      <button class="request-btn" onclick="requestQuote()">✉ Request a Quote</button>
    </div>
  </div>

</div><!-- /page-wrapper -->


<script>
/* ══════════════════════════════════════════════
   LOCATION DATA
══════════════════════════════════════════════ */

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const itinerary = new Set();
const markerElements = [];
let leafletMap = null; // global ref for invalidateSize()

/* ══════════════════════════════════════════════
   LOADING SEQUENCE
══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const fill = document.getElementById('loader-fill');
  const overlay = document.getElementById('loading-overlay');
  const pageWrapper = document.getElementById('page-wrapper');
  const mapContainer = document.getElementById('map-container');

  // Animate loader bar
  setTimeout(() => { fill.style.width = '70%'; }, 100);
  setTimeout(() => { fill.style.width = '100%'; }, 800);

  // Hide overlay & reveal page
  setTimeout(() => {
    overlay.classList.add('hidden');
    pageWrapper.classList.add('visible');

    setTimeout(() => {
      initMap();                          // init while hidden so Leaflet measures correctly
      mapContainer.classList.add('map-visible');
      // After the CSS opacity transition finishes, force Leaflet to recalc its size
      setTimeout(() => {
        if (leafletMap) leafletMap.invalidateSize();
      }, 1300);
    }, 400);

  }, 1600);
});

/* ══════════════════════════════════════════════
   MAP INITIALISATION
══════════════════════════════════════════════ */
function initMap() {
  leafletMap = L.map('map', {
    center: [7.8731, 80.7718],
    zoom: 7,
    zoomControl: true,
    attributionControl: true,
    scrollWheelZoom: true,
  });
  const map = leafletMap;

  // Dark CartoDB tiles
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Plot markers with staggered animation
  locations.forEach((loc, index) => {
    const delay = 300 + index * 90; // stagger over ~2.3s

    // Custom HTML icon
    const markerDiv = document.createElement('div');
    markerDiv.className = 'pulse-marker-wrapper marker-drop';
    markerDiv.innerHTML = `
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-dot"></div>
    `;
    markerElements.push(markerDiv);

    const icon = L.divIcon({
      html: markerDiv,
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -18],
    });

    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);

    // Bind popup
    const popupContent = buildPopupHTML(loc);
    marker.bindPopup(popupContent, {
      maxWidth: 280,
      closeButton: true,
      className: 'glass-popup',
    });

    // Drop-in animation with stagger
    setTimeout(() => {
      markerDiv.classList.add('dropped');
    }, delay);

    // Handle marker hover on desktop
    marker.on('mouseover', function() {
      if (window.innerWidth >= 768) this.openPopup();
    });
  });
}

/* ══════════════════════════════════════════════
   POPUP HTML BUILDER
══════════════════════════════════════════════ */
function buildPopupHTML(loc) {
  const safeName = loc.name.replace(/[^a-zA-Z0-9]/g, '');
  return `
    <div class="glass-card">
      <img class="card-img" src="${loc.img}" alt="${loc.name}" loading="lazy"
           onerror="this.src='https://images.unsplash.com/photo-1606822350112-0d97fdb1d41b?w=520&q=80&auto=format'" />
      <div class="card-body">
        <span class="card-location-badge">${loc.category}</span>
        <div class="card-title">${loc.name}</div>
        <div class="card-tagline">${loc.tagline}</div>
        <button
          id="btn-${safeName}"
          class="add-btn ${itinerary.has(loc.name) ? 'added' : ''}"
          onclick="toggleItinerary('${loc.name}', '${safeName}')"
        >
          ${itinerary.has(loc.name) ? '✓ Added' : '+ Add to Itinerary'}
        </button>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════
   ITINERARY LOGIC
══════════════════════════════════════════════ */
function toggleItinerary(name, safeName) {
  if (itinerary.has(name)) {
    itinerary.delete(name);
  } else {
    itinerary.add(name);
  }
  updatePanel();

  // Update the popup button in place
  const btn = document.getElementById(`btn-${safeName}`);
  if (btn) {
    if (itinerary.has(name)) {
      btn.textContent = '✓ Added';
      btn.classList.add('added');
    } else {
      btn.textContent = '+ Add to Itinerary';
      btn.classList.remove('added');
    }
  }
}

function updatePanel() {
  const list   = document.getElementById('itinerary-list');
  const empty  = document.getElementById('empty-msg');
  const count  = document.getElementById('item-count');

  if (itinerary.size === 0) {
    if (empty) empty.style.display = 'block';
    count.style.display = 'none';
    // Remove all items except empty msg
    [...list.querySelectorAll('.itinerary-item')].forEach(el => el.remove());
    return;
  }

  empty.style.display = 'none';
  count.style.display = 'inline-flex';
  count.textContent = itinerary.size;

  // Re-render list
  [...list.querySelectorAll('.itinerary-item')].forEach(el => el.remove());
  [...itinerary].forEach(name => {
    const div = document.createElement('div');
    div.className = 'itinerary-item';
    div.innerHTML = `
      <div class="item-dot"></div>
      <span class="item-name">${name}</span>
      <button class="item-remove" title="Remove" onclick="removeItem('${name}')">✕</button>
    `;
    list.appendChild(div);
  });
}

function removeItem(name) {
  itinerary.delete(name);
  updatePanel();
}

function togglePanel() {
  document.getElementById('itinerary-panel').classList.toggle('open');
}

function requestQuote() {
  if (itinerary.size === 0) {
    alert('Please add at least one destination to your itinerary before requesting a quote.');
    return;
  }
  const list = [...itinerary].join(', ');
  alert(`✈ Thank you! We'll prepare a custom quote for:\n\n${list}\n\nOur team will contact you shortly.`);
}
</script>
